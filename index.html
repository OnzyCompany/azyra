<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AZYRA | Luxury Fashion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FAF8F5;
            --warm-beige: #E8E0D5;
            --espresso: #1A1209;
            --gold: #C9A84C;
            --text-muted: #8B7355;
            --f-display: 'Cormorant Garamond', serif;
            --f-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-image: url('https://res.cloudinary.com/dtuuduvil/image/upload/v1776553663/5b20ab03-58eb-499b-aabc-1234d4bcab47.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: var(--f-body);
            color: var(--espresso);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 240, 235, 0.15);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            padding: 48px 24px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            flex-shrink: 0;
        }

        .profile-wrapper {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            padding: 4px;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.9);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-family: var(--f-display);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--espresso);
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-left: 0.3em;
        }

        .tagline {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .divider {
            width: 50px;
            height: 1px;
            background-color: var(--gold);
            margin: 0 auto;
            opacity: 0.8;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex-grow: 1;
        }

        .card {
            display: flex;
            align-items: center;
            width: 100%;
            height: 86px;
            border-radius: 20px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            background-color: #000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: scale(1.01);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
            opacity: 0.85;
            transition: transform 1s ease;
        }

        .card:hover .card-bg {
            transform: scale(1.05);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.25) 100%);
            z-index: 1;
        }

        .glass-panel {
            width: 60px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            padding-left: 20px;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .card-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2px;
        }

        .card-title {
            font-family: var(--f-display);
            font-size: 21px;
            color: #FFFFFF;
            font-weight: 600;
            line-height: 1.2;
        }

        .card-arrow {
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.85);
            font-size: 24px;
            position: relative;
            z-index: 2;
            padding-right: 5px;
        }

        footer {
            flex-shrink: 0;
            text-align: center;
            padding-top: 48px;
            padding-bottom: 32px;
        }

        .footer-logo {
            font-family: var(--f-display);
            font-size: 15px;
            color: var(--espresso);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .footer-location {
            font-family: var(--f-body);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            line-height: 1.6;
            font-weight: 500;
        }

        .footer-location a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
        }

        svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #ffffff !important;
            color: #ffffff !important;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .wa-icon {
            fill: #ffffff !important;
            stroke: none !important;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--espresso);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .lang-btn.active {
            background: var(--espresso);
            color: #fff;
            border-color: var(--espresso);
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                border: none;
                padding: 40px 20px 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('pt')">PT</button>
        </div>
        <header>
            <div class="profile-wrapper">
                <img src="https://res.cloudinary.com/dtuuduvil/image/upload/v1776551852/WhatsApp_Image_2026-04-18_at_19.33.25_2_qtz0b7.jpg" alt="AZYRA Logo" class="profile-image" referrerPolicy="no-referrer">
            </div>
            <h1>AZYRA</h1>
            <p class="tagline" data-i18n="tagline">fashion • luxury • purpose</p>
            <div class="divider"></div>
        </header>

        <main class="links-container">
            <!-- Card 1: WhatsApp da Loja -->
            <a id="link-store" href="#" class="card" target="_blank">
                <div class="card-bg" style="background-image: url('https://res.cloudinary.com/dtuuduvil/image/upload/v1776551852/WhatsApp_Image_2026-04-18_at_19.33.24_2_wodjkq.jpg');"></div>
                <div class="card-overlay"></div>
                <div class="glass-panel">
                    <svg viewBox="0 0 24 24" stroke="white" class="wa-icon">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .018 5.397.015 12.03c0 2.12.553 4.189 1.602 6.04L0 24l6.117-1.605a11.803 11.803 0 005.925 1.586h.005c6.635 0 12.032-5.397 12.035-12.031a11.762 11.762 0 00-3.418-8.253z"/>
                    </svg>
                </div>
                <div class="card-content">
                    <span class="card-label" data-i18n="storeLabel">AZYRA</span>
                    <span class="card-title" data-i18n="storeTitle">Store WhatsApp</span>
                </div>
                <div class="card-arrow">›</div>
            </a>

            <!-- Card 2: Denize -->
            <a id="link-denize" href="#" class="card" target="_blank">
                <div class="card-bg" style="background-image: url('https://res.cloudinary.com/dtuuduvil/image/upload/v1776551852/WhatsApp_Image_2026-04-18_at_19.33.25_iankzb.jpg');"></div>
                <div class="card-overlay"></div>
                <div class="glass-panel">
                    <svg viewBox="0 0 24 24" stroke="none" fill="white">
                        <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3H5v-2h14v2z"/>
                    </svg>
                </div>
                <div class="card-content">
                    <span class="card-label" data-i18n="vipLabel">VIP SERVICE</span>
                    <span class="card-title" data-i18n="denizeTitle">Chat with Denize</span>
                </div>
                <div class="card-arrow">›</div>
            </a>

            <!-- Card 3: Fernanda Santos -->
            <a id="link-fernanda" href="#" class="card" target="_blank">
                <div class="card-bg" style="background-image: url('https://res.cloudinary.com/dtuuduvil/image/upload/v1776551852/WhatsApp_Image_2026-04-18_at_19.33.24_1_ek3vds.jpg');"></div>
                <div class="card-overlay"></div>
                <div class="glass-panel">
                    <svg viewBox="0 0 24 24" stroke="white" fill="none">
                        <path d="M19.07 4.93a10 10 0 0 0-14.14 0M12 2a10 10 0 0 0-10 10v9h4v-7h12v7h4v-9a10 10 0 0 0-10-10z"/>

                    </svg>
                </div>
                <div class="card-content">
                    <span class="card-label" data-i18n="teamLabel">OUR TEAM</span>
                    <span class="card-title" data-i18n="fernandaTitle">Fernanda Santos</span>
                </div>
                <div class="card-arrow">›</div>
            </a>

            <!-- Card 4: Grupo Exclusivo -->
            <a href="https://chat.whatsapp.com/CGvPwNVzAR4CweTZHcmMmh?mode=gi_t" class="card" target="_blank">
                <div class="card-bg" style="background-image: url('https://res.cloudinary.com/dtuuduvil/image/upload/v1776551852/WhatsApp_Image_2026-04-18_at_19.33.25_1_sbu8ch.jpg');"></div>
                <div class="card-overlay"></div>
                <div class="glass-panel">
                    <svg viewBox="0 0 24 24" stroke="white">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <div class="card-content">
                    <span class="card-label" data-i18n="communityLabel">COMMUNITY</span>
                    <span class="card-title" data-i18n="groupTitle">Exclusive Group</span>
                </div>
                <div class="card-arrow">›</div>
            </a>

            <!-- Card 5: Azyra Shop -->
            <a href="https://azyrashop.com/pt?utm_source=ig&utm_medium=social&utm_content=link_in_bio" class="card" target="_blank">
                <div class="card-bg" style="background-image: url('https://res.cloudinary.com/dtuuduvil/image/upload/v1776551852/WhatsApp_Image_2026-04-18_at_19.33.24_uu9fz6.jpg');"></div>
                <div class="card-overlay"></div>
                <div class="glass-panel">
                    <svg viewBox="0 0 24 24" stroke="white">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                        <path d="M3 6h18"></path>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </div>
                <div class="card-content">
                    <span class="card-label" data-i18n="shopLabel">OUR STORE</span>
                    <span class="card-title" data-i18n="shopTitle">Azyra Shop</span>
                </div>
                <div class="card-arrow">›</div>
            </a>
        </main>

        <footer>
            <p class="footer-logo">AZYRA</p>
            <p class="footer-location"><span data-i18n="developedBy">Developed by</span> <a href="https://www.instagram.com/_xkayky.s/" target="_blank">jKayzz</a></p>
        </footer>
    </div>

    <script>
        const translations = {
            en: {
                tagline: "fashion • luxury • purpose",
                storeLabel: "AZYRA",
                storeTitle: "Store WhatsApp",
                vipLabel: "VIP SERVICE",
                denizeTitle: "Chat with Denize",
                teamLabel: "OUR TEAM",
                fernandaTitle: "Fernanda Santos",
                communityLabel: "COMMUNITY",
                groupTitle: "Exclusive Group",
                shopLabel: "OUR STORE",
                shopTitle: "Azyra Shop",
                developedBy: "Developed by",
                storeMsg: "Hello, I came from the AZYRA bio link and would like more information.",
                denizeMsg: "Hello Denize, I came from the AZYRA bio link.",
                fernandaMsg: "Hello Fernanda Santos, I came from the AZYRA bio link."
            },
            pt: {
                tagline: "moda • luxo • propósito",
                storeLabel: "AZYRA",
                storeTitle: "WhatsApp da Loja",
                vipLabel: "ATENDIMENTO VIP",
                denizeTitle: "Falar com a Denize",
                teamLabel: "NOSSA EQUIPE",
                fernandaTitle: "Fernanda Santos",
                communityLabel: "COMUNIDADE",
                groupTitle: "Grupo Exclusivo",
                shopLabel: "NOSSA LOJA",
                shopTitle: "Azyra Shop",
                developedBy: "Desenvolvido por",
                storeMsg: "Olá, vim pelo link na bio da AZYRA e gostaria de saber mais informações.",
                denizeMsg: "Olá Denize, vim pelo link na bio da AZYRA.",
                fernandaMsg: "Olá Fernanda Santos, vim pelo link na bio da AZYRA."
            }
        };

        function setLanguage(lang) {
            // Update button states
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
            });

            // Update text elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });

            // Update WhatsApp links
            const t = translations[lang];
            
            document.getElementById('link-store').href = `https://wa.me/14047257001?text=${encodeURIComponent(t.storeMsg)}`;
            document.getElementById('link-denize').href = `https://wa.me/14043143250?text=${encodeURIComponent(t.denizeMsg)}`;
            document.getElementById('link-fernanda').href = `https://wa.me/14044281353?text=${encodeURIComponent(t.fernandaMsg)}`;
        }

        // Initialize with English as requested
        setLanguage('en');
    </script>
</body>
</html>
